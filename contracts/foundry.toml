[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
via_ir = true
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "solady/=lib/solady/src/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
mantle         = "${MANTLE_RPC_URL}"
mantle_sepolia = "${MANTLE_SEPOLIA_RPC_URL}"
